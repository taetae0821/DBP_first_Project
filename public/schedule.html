<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - 상영일정</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="schdule.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">🎬 CineBook</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto ms-4">
        <li class="nav-item"><a class="nav-link" href="index.html">영화</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">상영일정</a></li>
        <li class="nav-item"><a class="nav-link" href="booking.html">예매내역</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h2>상영 <span>일정</span></h2>
    <p style="color:#666; font-size:0.9rem; margin:0">날짜와 영화를 선택하면 상영 시간을 확인할 수 있어요</p>
  </div>
</div>

<div class="date-bar">
  <div class="container">
    <div class="d-flex gap-2 overflow-auto pb-1" id="dateBtns"></div>
  </div>
</div>

<div class="container py-4">
  <div class="row g-4">
    <div class="col-lg-3">
      <div class="sidebar-title">영화 선택</div>
      <div id="movieList"><p style="color:#666; font-size:0.9rem;">불러오는 중...</p></div>
    </div>

    <div class="col-lg-9">
      <div class="sidebar-title">상영 시간 선택</div>
      <div id="scheduleList"><p style="color:#666; font-size:0.9rem;">영화를 선택해주세요</p></div>
      <div style="font-size:0.78rem; color:#444; margin-top:16px;">
        <span style="display:inline-block; width:10px; height:10px; background:#4caf50; border-radius:2px; margin-right:4px;"></span>여유
        <span style="display:inline-block; width:10px; height:10px; background:#ff9800; border-radius:2px; margin: 0 4px 0 12px;"></span>마감임박
        <span style="display:inline-block; width:10px; height:10px; background:#333; border-radius:2px; margin: 0 4px 0 12px;"></span>매진
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const days = ['일','월','화','수','목','금','토'];
  const today = new Date();
  let selectedDate = today.toISOString().split('T')[0];
  let selectedMovieId = null;

  // 날짜 버튼 생성
  const container = document.getElementById('dateBtns');
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dateStr = d.toISOString().split('T')[0];
    const btn = document.createElement('button');
    btn.className = 'date-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `<span class="day-name">${i === 0 ? '오늘' : days[d.getDay()]}</span><span class="day-num">${d.getDate()}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDate = dateStr;
      if (selectedMovieId) loadSchedules();
    };
    container.appendChild(btn);
  }

  async function loadMovies() {
    const res = await fetch('/movies');
    if (!res.ok) return;
    const movies = await res.json();

    const list = document.getElementById('movieList');
    if (movies.length === 0) {
      list.innerHTML = '<p style="color:#666; font-size:0.9rem;">상영 중인 영화가 없습니다.</p>';
      return;
    }

    list.innerHTML = movies.map((m, i) => `
      <div class="movie-list-item ${i === 0 ? 'active' : ''}" onclick="selectMovie(this, ${m.id})">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="title">${m.title}</div>
            <div class="meta">${m.duration}분</div>
          </div>
          <span class="badge-sm">${m.rating}</span>
        </div>
      </div>
    `).join('');

    // 첫 번째 영화 자동 선택
    selectedMovieId = movies[0].id;
    loadSchedules();
  }

  function selectMovie(el, movieId) {
    document.querySelectorAll('.movie-list-item').forEach(m => m.classList.remove('active'));
    el.classList.add('active');
    selectedMovieId = movieId;
    loadSchedules();
  }

  async function loadSchedules() {
    const res = await fetch(`/schedules?movie_id=${selectedMovieId}&date=${selectedDate}`);
    const scheduleList = document.getElementById('scheduleList');

    if (!res.ok) {
      scheduleList.innerHTML = '<p style="color:#666;">일정을 불러올 수 없습니다.</p>';
      return;
    }

    const schedules = await res.json();
    if (schedules.length === 0) {
      scheduleList.innerHTML = '<p style="color:#666;">해당 날짜의 상영 일정이 없습니다.</p>';
      return;
    }

    // 상영관별 그룹핑
    const grouped = {};
    schedules.forEach(s => {
      if (!grouped[s.theater]) grouped[s.theater] = [];
      grouped[s.theater].push(s);
    });

    scheduleList.innerHTML = Object.entries(grouped).map(([theater, times]) => `
      <div class="theater-section">
        <div class="theater-name">${theater}</div>
        <div>
          ${times.map(s => {
            const isSoldOut = s.available_seats === 0;
            const isFew = s.available_seats > 0 && s.available_seats <= 10;
            const seatClass = isSoldOut ? '' : isFew ? 'few' : 'many';
            const seatText = isSoldOut ? '매진' : `잔여 ${s.available_seats}석`;
            return `
              <div class="time-slot ${isSoldOut ? 'sold-out' : ''}" ${!isSoldOut ? `onclick="goSeat(${s.id})"` : ''}>
                <span class="time">${s.screen_time}</span>
                <span class="seats ${seatClass}">${seatText}</span>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `).join('');
  }

  function goSeat(scheduleId) {
    window.location.href = `seat.html?schedule_id=${scheduleId}`;
  }

  loadMovies();
</script>
</body>
</html>
