<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - 예매내역</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="booking.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">🎬 CineBook</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto ms-4">
        <li class="nav-item"><a class="nav-link" href="index.html">영화</a></li>
        <li class="nav-item"><a class="nav-link" href="schedule.html">상영일정</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">예매내역</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h2 style="font-size:1.8rem; font-weight:700;">예매 <span style="color:#e50914">내역</span></h2>
    <p id="userNameText" style="color:#666; font-size:0.9rem; margin:0"></p>
  </div>
</div>

<div class="container py-4">
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">총 예매 횟수</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-num" id="confirmedCount">0</div>
        <div class="stat-label">예매완료</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-num" id="cancelledCount">0</div>
        <div class="stat-label">취소</div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="filterTab('전체', this)">전체</button>
    <button class="tab-btn" onclick="filterTab('confirmed', this)">예매완료</button>
    <button class="tab-btn" onclick="filterTab('취소', this)">취소</button>
  </div>

  <div id="bookingList">
    <p id="loadingMsg" style="color:#666; text-align:center; margin-top:40px;">불러오는 중...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let allBookings = [];

  async function loadBookings() {
    const userRes = await fetch('/userinfo');
    if (!userRes.ok) {
      alert('로그인이 필요합니다.');
      window.location.href = "login.html";;
      return;
    }
    const user = await userRes.json();
    document.getElementById('userNameText').textContent = user.name + ' 님의 예매 내역이에요';

    const res = await fetch('/bookings');
    if (!res.ok) {
      document.getElementById('loadingMsg').textContent = '예매 내역을 불러올 수 없습니다.';
      return;
    }

    allBookings = await res.json();
    updateStats();
    renderBookings(allBookings);
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = allBookings.length;
    document.getElementById('confirmedCount').textContent = allBookings.filter(b => b.status === 'confirmed').length;
    document.getElementById('cancelledCount').textContent = allBookings.filter(b => b.status === '취소').length;
  }

  function renderBookings(bookings) {
    const list = document.getElementById('bookingList');
    if (bookings.length === 0) {
      list.innerHTML = '<p style="color:#666; text-align:center; margin-top:40px;">예매 내역이 없습니다.</p>';
      return;
    }

    list.innerHTML = bookings.map(b => {
      const date = new Date(b.screen_date);
      const dateStr = date.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
      const isCancelled = b.status === '취소';
      const statusLabel = b.status === 'confirmed' ? '예매완료' : '취소됨';
      const statusClass = b.status === 'confirmed' ? 'status-confirmed' : 'status-cancelled';

      return `
        <div class="booking-card" data-status="${b.status}">
          <div class="card-header-bar">
            <span class="booking-num">예매번호 #${b.id}</span>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          <div class="card-body-wrap" style="${isCancelled ? 'opacity:0.5' : ''}">
            <div class="emoji-poster">🎬</div>
            <div style="flex:1">
              <div class="movie-title">${b.title}</div>
              <div class="detail-row"><strong>일시</strong>${dateStr} ${b.screen_time}</div>
              <div class="detail-row"><strong>상영관</strong>${b.theater}</div>
              <div class="detail-row"><strong>좌석</strong><span class="seat-tag">${b.seat_number}</span></div>
            </div>
            ${!isCancelled ? `<div><button class="btn-cancel" onclick="cancelBooking(${b.id})">취소</button></div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  function filterTab(status, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = status === '전체' ? allBookings : allBookings.filter(b => b.status === status);
    renderBookings(filtered);
  }

  async function cancelBooking(id) {
    if (!confirm('예매를 취소하시겠습니까?')) return;

    const res = await fetch(`/booking/${id}`, { method: 'DELETE' });
    const result = await res.json();
    alert(result.message);
    loadBookings();
  }

  loadBookings();
</script>
</body>
</html>
