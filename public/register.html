<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - 회원가입</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="register-box">
    <div class="logo">🎬 CineBook</div>
    <div class="subtitle">회원가입하고 영화를 예매하세요</div>

    <div class="section-divider">기본 정보</div>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">이름</label>
        <input type="text" name="name" class="form-control" placeholder="홍길동" required>
      </div>

      <div class="mb-3">
        <label class="form-label">이메일</label>
        <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
        <div class="form-hint">로그인 시 사용되는 이메일이에요</div>
      </div>

      <div class="mb-3">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="8자 이상 입력" required>
      </div>

      <div class="mb-3">
        <label class="form-label">비밀번호 확인</label>
        <input type="password" name="passwordCheck" class="form-control" placeholder="비밀번호 재입력" required>
      </div>

      <div class="section-divider">추가 정보</div>

      <div class="mb-3">
        <label class="form-label">생년월일</label>
        <input type="date" name="birth" class="form-control" required>
        <div class="form-hint">관람등급 확인에 사용돼요</div>
      </div>

      <div class="mb-3">
        <label class="form-label">
          전화번호
          <span style="color:#444; font-size:0.75rem;">(선택)</span>
        </label>
        <input type="tel" name="phone" class="form-control" placeholder="010-0000-0000">
      </div>

      <button type="submit" class="btn-register mt-2">회원가입</button>
    </form>

    <div class="login-link">
      이미 회원이신가요? <a href="login.html">로그인</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const password = document.querySelector('[name="password"]').value;
      const passwordCheck = document.querySelector('[name="passwordCheck"]').value;

      if (password !== passwordCheck) {
        alert('비밀번호가 일치하지 않습니다.');
        return;
      }

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());
      delete data.passwordCheck;

      const res = await fetch('/user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (res.ok) {
        alert('회원가입 성공!');
        window.location.href = '/login.html';
      } else {
        alert(result.message);
      }
    });
  </script>
</body>
</html>
