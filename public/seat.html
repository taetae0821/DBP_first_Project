<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineBook - 좌석 선택</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="seat.css">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">🎬 CineBook</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto ms-4">
        <li class="nav-item"><a class="nav-link" href="index.html">영화</a></li>
        <li class="nav-item"><a class="nav-link" href="schedule.html">상영일정</a></li>
        <li class="nav-item"><a class="nav-link" href="booking.html">예매내역</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h2 style="font-size:1.5rem; font-weight:700; margin-bottom:6px;">좌석 <span style="color:#e50914">선택</span></h2>
    <div class="movie-info-bar" id="infoBar">불러오는 중...</div>
  </div>
</div>

<div class="container py-4">
  <div class="row g-4">
    <div class="col-lg-8">
      <div class="screen-wrap">
        <div class="screen"></div>
        <div class="screen-label">S C R E E N</div>
      </div>
      <div class="seat-grid" id="seatGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1e2a1e; border:1px solid #2a3a2a;"></div>선택 가능</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e50914;"></div>선택됨</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a1a1a; border:1px solid #222;"></div>예매됨</div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="booking-sidebar">
        <div class="sidebar-title">예매 정보</div>
        <div class="info-row"><span class="info-label">영화</span><span class="info-value" id="sideTitle">-</span></div>
        <div class="info-row"><span class="info-label">상영관</span><span class="info-value" id="sideTheater">-</span></div>
        <div class="info-row"><span class="info-label">날짜/시간</span><span class="info-value" id="sideTime">-</span></div>

        <div style="margin-top:14px; font-size:0.82rem; color:#666; margin-bottom:4px;">선택한 좌석</div>
        <div class="selected-seats" id="selectedDisplay">좌석을 선택해 주세요</div>

        <div class="info-row" style="margin-top:8px;">
          <span class="info-label">인원</span>
          <span class="info-value" id="countDisplay">0명</span>
        </div>
        <div class="info-row">
          <span class="info-label">금액</span>
          <span class="price-total" id="priceDisplay">0원</span>
        </div>

        <button class="btn-confirm" id="confirmBtn" disabled onclick="confirmBooking()">예매하기</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const rows = ['A','B','C','D','E','F','G','H'];
  const cols = 12;
  const PRICE = 14000;
  let selected = [];
  let scheduleId = null;

  const params = new URLSearchParams(window.location.search);
  scheduleId = params.get('schedule_id');

  async function loadScheduleInfo() {
    if (!scheduleId) {
      document.getElementById('infoBar').textContent = '잘못된 접근입니다.';
      return;
    }

    const res = await fetch(`/schedules?movie_id=`);
    // 상영일정 전체에서 해당 id 찾기
    const allRes = await fetch(`/schedules`);
    const allSchedules = await allRes.json();
    const schedule = allSchedules.find(s => s.id == scheduleId);

    if (schedule) {
      const date = new Date(schedule.screen_date);
      const dateStr = date.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
      document.getElementById('infoBar').innerHTML = `<strong>${schedule.title}</strong> <span>|</span> ${schedule.theater} <span>|</span> ${dateStr} ${schedule.screen_time}`;
      document.getElementById('sideTitle').textContent = schedule.title;
      document.getElementById('sideTheater').textContent = schedule.theater;
      document.getElementById('sideTime').textContent = `${dateStr} ${schedule.screen_time}`;
    }

    loadSeats();
  }

  async function loadSeats() {
    const res = await fetch(`/seats/${scheduleId}`);
    let takenSeats = [];

    if (res.ok) {
      const seats = await res.json();
      takenSeats = seats.filter(s => s.status === 'taken').map(s => s.seat_number);
    }

    // 예매된 좌석도 확인
    const bookRes = await fetch(`/bookings`);
    if (bookRes.ok) {
      const bookings = await bookRes.json();
      const bookedSeats = bookings
        .filter(b => b.schedule_id == scheduleId && b.status !== '취소')
        .map(b => b.seat_number);
      takenSeats = [...new Set([...takenSeats, ...bookedSeats])];
    }

    renderSeats(takenSeats);
  }

  function renderSeats(takenSeats) {
    const grid = document.getElementById('seatGrid');
    grid.innerHTML = '';

    rows.forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'seat-row';
      const label = document.createElement('div');
      label.className = 'row-label';
      label.textContent = row;
      rowEl.appendChild(label);

      for (let c = 1; c <= cols; c++) {
        if (c === 4) {
          const gap = document.createElement('div');
          gap.className = 'seat-gap';
          rowEl.appendChild(gap);
        }
        const seatId = row + c;
        const seat = document.createElement('div');
        const isTaken = takenSeats.includes(seatId);
        seat.className = 'seat ' + (isTaken ? 'taken' : 'available');
        seat.dataset.id = seatId;
        seat.textContent = c;
        if (!isTaken) {
          seat.onclick = () => toggleSeat(seat, seatId);
        }
        rowEl.appendChild(seat);
      }
      grid.appendChild(rowEl);
    });
  }

  function toggleSeat(el, id) {
    if (el.classList.contains('selected')) {
      el.classList.remove('selected');
      el.classList.add('available');
      selected = selected.filter(s => s !== id);
    } else {
      if (selected.length >= 8) { alert('최대 8석까지 선택 가능해요'); return; }
      el.classList.remove('available');
      el.classList.add('selected');
      selected.push(id);
    }
    updateSidebar();
  }

  function updateSidebar() {
    const d = document.getElementById('selectedDisplay');
    if (selected.length === 0) {
      d.textContent = '좌석을 선택해 주세요';
      d.style.color = '#555';
    } else {
      d.textContent = selected.sort().join(', ');
      d.style.color = '#f0f0f0';
    }
    document.getElementById('countDisplay').textContent = selected.length + '명';
    document.getElementById('priceDisplay').textContent = (selected.length * PRICE).toLocaleString() + '원';
    document.getElementById('confirmBtn').disabled = selected.length === 0;
  }

  async function confirmBooking() {
    const userRes = await fetch('/userinfo');
    if (!userRes.ok) {
      alert('로그인이 필요합니다.');
      window.location.href = '/login.html';
      return;
    }

    const res = await fetch('/booking', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ schedule_id: scheduleId, seat_numbers: selected })
    });

    const result = await res.json();
    if (res.ok) {
      alert('예매가 완료되었습니다!');
      window.location.href = '/booking.html';
    } else {
      alert(result.message);
    }
  }

  loadScheduleInfo();
</script>
</body>
</html>
